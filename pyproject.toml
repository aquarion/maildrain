[tool.poetry]
name = "depop"
version = "0.1.0"
description = "Depopulate a POP3 server by migrating mail to Gmail and archiving via IMAP"
authors = []
packages = [{include = "depop"}]

[tool.poetry.dependencies]
python = "^3.11"
google-api-python-client = "^2.155.0"
google-auth-oauthlib = "^1.2.0"
google-auth = "^2.37.0"
imapclient = "^3.0.1"
python-dotenv = "^1.0.0"

[tool.poetry.scripts]
depop = "depop.main:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
