# Builds and deploys the Docker image to Cloud Run after tests pass.
# Only triggers when application code or dependencies change.
#
# This workflow:
# 1. Runs tests to ensure code quality
# 2. Builds and deploys the Docker image if tests pass
# 3. Only triggers on changes to deployment-relevant files
#
# Required GitHub configuration:
#
#   Variables (Settings > Secrets and variables > Actions > Variables):
#     GCP_PROJECT_ID        — GCP project ID
#     GCP_SERVICE_ACCOUNT   — service account email used by the Cloud Run Job
#     GAR_LOCATION          — Artifact Registry region, e.g. europe-west2
#     GAR_REPOSITORY        — Artifact Registry repository name, e.g. maildrain
#     CLOUD_RUN_REGION      — Cloud Run region, e.g. europe-west2
#
#   Secrets (Settings > Secrets and variables > Actions > Secrets):
#     GCP_WORKLOAD_IDENTITY_PROVIDER — Workload Identity provider resource name
#       Format: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
#       See: https://github.com/google-github-actions/auth#setting-up-workload-identity-federation
#
# The Cloud Run Job must already exist. Create it once with:
#   gcloud run jobs create maildrain --image IMAGE --region REGION ...
# (see README for the full create command)

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "maildrain/**"
      - "pyproject.toml"
      - "poetry.lock"
      - "Dockerfile"
  workflow_dispatch:

env:
  IMAGE: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/maildrain

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --with dev

      - name: Run tests
        run: |
          poetry run pytest tests/ \
            --cov=maildrain.gmail_client \
            --cov=maildrain.models \
            --cov-report=term \
            --cov-fail-under=95

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test
    # Only deploy if tests pass
    if: success()

    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update maildrain \
            --image "$IMAGE:$GITHUB_SHA" \
            --region "${{ vars.CLOUD_RUN_REGION }}"
